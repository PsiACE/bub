site_name: bub
repo_url: https://github.com/bubbuild/bub
site_url: https://bub.build
site_description: "An agent partner for real teams: visible execution, reliable collaboration."
site_author: Bub Build
edit_uri: edit/main/docs/
repo_name: bubbuild/bub
copyright: Copyright (c) 2026 Bub Build contributors.

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Extension Guide: extension-guide.md
  - CLI: cli.md
  - Channels: channels.md
  - Skills: skills.md
  - Deployment: deployment.md
  - Key Features: features.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/bub"]

theme:
  name: terminal
  palette: dark
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bubbuild/bub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bub
